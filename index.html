<!DOCTYPE html>
<html>
<head>
<title>Royal Life RP Whitelist</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

.form-wrapper{
max-width:900px;
margin:auto;
padding:40px;
}

.royal-form{
width:100%;
height:1200px;
border-radius:12px;
border:none;
margin-top:40px;
}

.apply-btn{
background:#5865F2;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

.apply-btn:hover{
background:#4752c4;
}

</style>

<script>
function showForm(){
document.getElementById("form").scrollIntoView({behavior: "smooth"});
}
</script>

</head>

<body>

<div class="form-wrapper">

<h1>Royal Life RP</h1>
<h2>Whitelist Application</h2>

<p>Click the button below to apply for access to the city.</p>

<button class="apply-btn" onclick="showForm()">
Apply for Whitelist
</button>

<div id="form">

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSffZdAutiv1pPpvx3ZMjKBS9SoD8RQfOtr-tFt6A0q188JjWw/viewform?embedded=true" width="640" height="5140" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
class="royal-form">
</iframe>

</div>

</div>

</body>
</html>
