<!DOCTYPE html>
<html>
<head>
<title>Royal Life RP Whitelist</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
margin-top:150px;
}

.apply-btn{
background:#5865F2;
color:white;
border:none;
padding:16px 32px;
font-size:20px;
border-radius:8px;
cursor:pointer;
}

.apply-btn:hover{
background:#4752c4;
}

/* Popup background */

.modal{
display:none;
position:fixed;
z-index:1;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
}

/* Popup box */

.modal-content{
position:relative;
margin:5% auto;
width:80%;
max-width:900px;
background:#111;
padding:20px;
border-radius:10px;
}

/* Close button */

.close{
color:white;
float:right;
font-size:28px;
cursor:pointer;
}

/* Google form */

.royal-form{
width:100%;
height:600px;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Royal Life RP</h1>
<h2>Whitelist Application</h2>

<button class="apply-btn" onclick="openForm()">
Apply for Whitelist
</button>

<!-- Modal -->

<div id="formModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeForm()">&times;</span>

<iframe 
src="https://docs.google.com/forms/d/e/1FAIpQLSffZdAutiv1pPpvx3ZMjKBS9SoD8RQfOtr-tFt6A0q188JjWw/viewform?embedded=true"
class="royal-form">
</iframe>

</div>

</div>

<script>

function openForm(){
document.getElementById("formModal").style.display = "block";
}

function closeForm(){
document.getElementById("formModal").style.display = "none";
}

</script>

</body>
</html>
